<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phexus Math</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header id="top-bar">
        <div class="brand">
            <h1>Phexus<span>Math</span></h1>
        </div>
        
        <div class="search-container">
            <input type="text" id="gameSearch" placeholder="Search games...">
        </div>

        <div class="status-indicator" id="cdnStatus">
            <span class="dot"></span> <span id="statusText">Checking Connection...</span>
        </div>
    </header>

    <main id="content-area">
        <section id="library-hub">
            <div id="game-grid" class="loading-state">
                <div class="spinner"></div>
            </div>
        </section>

        <section id="game-viewport">
            <div class="viewport-controls">
                <button id="back-to-hub"><i class="fas fa-arrow-left"></i> Back</button>
                <button id="fullscreen-btn"><i class="fas fa-expand"></i> Fullscreen</button>
            </div>
            <iframe id="gameFrame" allowfullscreen></iframe>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
