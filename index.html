<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>phexusmath.github.io</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        
        /* Navigation */
        nav { padding: 1rem 2rem; background: #020617; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
        .logo { font-size: 1.5rem; font-weight: bold; cursor: pointer; color: var(--accent); }
        #searchBar { padding: 10px 15px; border-radius: 20px; border: 1px solid #334155; background: #1e293b; color: white; width: 300px; outline: none; }

        /* Grid */
        .container { padding: 30px; max-width: 1200px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .game-card { background: var(--card); padding: 20px; border-radius: 12px; cursor: pointer; text-align: center; transition: transform 0.2s, border-color 0.2s; border: 2px solid transparent; }
        .game-card:hover { transform: translateY(-5px); border-color: var(--accent); }

        /* Game View */
        .hidden { display: none; }
        .controls { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; transition: opacity 0.2s; }
        .btn-back { background: #64748b; color: white; }
        .btn-fs { background: var(--accent); color: #0f172a; }
        .btn:hover { opacity: 0.8; }
        
        iframe { width: 100%; height: 75vh; border: none; background: #000; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<nav>
    <div class="logo" onclick="showPage('home')">phexusmath.github.io</div>
    <input type="text" id="searchBar" placeholder="Find a game..." onkeyup="filterGames()">
</nav>

<div class="container">
    <!-- Home Page -->
    <section id="home">
        <div id="gameGrid" class="grid"></div>
    </section>

    <!-- Game/Embed Page -->
    <section id="gameView" class="hidden">
        <div class="controls">
            <button class="btn btn-back" onclick="showPage('home')">← Back</button>
            <button class="btn btn-fs" onclick="toggleFullScreen()">⛶ Full Screen</button>
        </div>
        <h2 id="currentGameTitle"></h2>
        <iframe id="gameFrame" src="" allowfullscreen></iframe>
    </section>
</div>

<script>
    let gamesData = [];

    async function loadGames() {
        try {
            const response = await fetch('/list.json');
            gamesData = await response.json();
            renderGames(gamesData);
        } catch (err) {
            console.error("Failed to load games list:", err);
        }
    }

    function renderGames(games) {
        const grid = document.getElementById('gameGrid');
        grid.innerHTML = '';
        games.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.innerHTML = `<h3>${game.name}</h3>`;
            card.onclick = () => launchGame(game);
            grid.appendChild(card);
        });
    }

    function filterGames() {
        const query = document.getElementById('searchBar').value.toLowerCase();
        const filtered = gamesData.filter(g => g.name.toLowerCase().includes(query));
        renderGames(filtered);
    }

    function launchGame(game) {
        // PATH LOGIC: lower case and replace spaces with dashes
        const folderName = game.name.toLowerCase().replace(/\s+/g, '-');
        const gameUrl = `files/${folderName}/index.html`;

        document.getElementById('currentGameTitle').innerText = game.name;
        document.getElementById('gameFrame').src = gameUrl;
        showPage('gameView');
    }

    function showPage(pageId) {
        document.getElementById('home').classList.add('hidden');
        document.getElementById('gameView').classList.add('hidden');
        document.getElementById(pageId).classList.remove('hidden');
        if(pageId === 'home') document.getElementById('gameFrame').src = '';
    }

    function toggleFullScreen() {
        const frame = document.getElementById('gameFrame');
        if (frame.requestFullscreen) {
            frame.requestFullscreen();
        } else if (frame.webkitRequestFullscreen) { /* Safari */
            frame.webkitRequestFullscreen();
        } else if (frame.msRequestFullscreen) { /* IE11 */
            frame.msRequestFullscreen();
        }
    }

    loadGames();
</script>
</body>
</html>
