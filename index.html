<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>phexusmath.github.io</title>
    <style>
        :root { 
            --bg: #0f172a; 
            --card: #1e293b; 
            --accent: #38bdf8; 
            --text: #f8fafc; 
            --glass: rgba(30, 41, 59, 0.7);
        }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            overflow-x: hidden;
        }

        /* Navigation */
        nav { 
            padding: 1rem 2rem; 
            background: #020617; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #334155;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-size: 1.5rem; font-weight: 800; cursor: pointer; color: var(--accent); letter-spacing: -0.5px; }
        #searchBar { 
            padding: 10px 15px; 
            border-radius: 20px; 
            border: 1px solid #334155; 
            background: #1e293b; 
            color: white; 
            width: 300px; 
            outline: none; 
            transition: border-color 0.3s;
        }
        #searchBar:focus { border-color: var(--accent); }

        .container { padding: 30px; max-width: 1200px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        
        .game-card { 
            background: var(--card); 
            padding: 24px; 
            border-radius: 16px; 
            cursor: pointer; 
            text-align: center; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            border: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .game-card:hover { 
            transform: translateY(-8px); 
            border-color: var(--accent); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }

        /* Improved Game View */
        .hidden { display: none; }
        
        #gameView {
            max-width: 1000px;
            margin: 0 auto;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        /* Container holds the shape */
        .game-container {
            position: relative;
            width: 100%;
            background: #000;
            /* Round only the top corners of the main container */
            border-radius: 16px 16px 0 0; 
            overflow: hidden;
            box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid #334155;
            border-bottom: none; /* Remove bottom border to blend with bar */
            aspect-ratio: 16 / 9;
        }

        /* Loading Spinner */
        .loader {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            border: 4px solid #334155;
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            position: relative;
            z-index: 2;
        }

        /* UIX Control Bar */
        .game-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass);
            backdrop-filter: blur(12px);
            padding: 12px 20px;
            border-radius: 0 0 16px 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .btn { 
            padding: 8px 16px; 
            border-radius: 8px; 
            border: none; 
            cursor: pointer; 
            font-weight: 600; 
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s; 
        }
        .btn-back { background: transparent; color: #94a3b8; }
        .btn-back:hover { color: white; background: rgba(255,255,255,0.05); }
        .btn-fs { background: var(--accent); color: #0f172a; }
        .btn-fs:hover { transform: scale(1.05); filter: brightness(1.1); }

    </style>
</head>
<body>

<nav>
    <div class="logo" onclick="showPage('home')">phexusmath.github.io</div>
    <input type="text" id="searchBar" placeholder="Search games..." onkeyup="filterGames()">
</nav>

<div class="container">
    <section id="home">
        <div id="gameGrid" class="grid"></div>
    </section>

    <section id="gameView" class="hidden">
        <div class="game-header">
            <button class="btn btn-back" onclick="showPage('home')">← Back to Library</button>
            <h2 id="currentGameTitle" style="margin:0; font-size: 1.2rem;"></h2>
        </div>

        <div class="game-container">
            <div id="iframeLoader" class="loader"></div>
            <iframe id="gameFrame" src="" allowfullscreen onload="document.getElementById('iframeLoader').style.display='none'"></iframe>
        </div>

        <div class="game-bar">
            <span style="font-size: 0.8rem; color: #94a3b8;">Status: Ready to play</span>
            <button class="btn btn-fs" onclick="toggleFullScreen()">
                <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M1.5 1a.5.5 0 0 0-.5.5v4a.5.5 0 0 1-1 0v-4A1.5 1.5 0 0 1 1.5 0h4a.5.5 0 0 1 0 1h-4zM10 .5a.5.5 0 0 1 .5-.5h4A1.5 1.5 0 0 1 16 1.5v4a.5.5 0 0 1-1 0v-4a.5.5 0 0 0-.5-.5h-4a.5.5 0 0 1-.5-.5zM.5 10a.5.5 0 0 1 .5.5v4a.5.5 0 0 0 .5.5h4a.5.5 0 0 1 0 1h-4A1.5 1.5 0 0 1 0 14.5v-4a.5.5 0 0 1 .5-.5zm15 0a.5.5 0 0 1 .5.5v4a1.5 1.5 0 0 1-1.5 1.5h-4a.5.5 0 0 1 0-1h4a.5.5 0 0 0 .5-.5v-4a.5.5 0 0 1 .5-.5z"/></svg>
                Full Screen
            </button>
        </div>
    </section>
</div>

<script>
    let gamesData = [];

    async function loadGames() {
        // Mock data for demonstration if list.json is missing
        try {
            const response = await fetch('/list.json');
            gamesData = await response.json();
        } catch (err) {
            gamesData = [{name: "Sample Game"}]; 
        }
        renderGames(gamesData);
    }

    function renderGames(games) {
        const grid = document.getElementById('gameGrid');
        grid.innerHTML = '';
        games.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.innerHTML = `<h3>${game.name}</h3>`;
            card.onclick = () => launchGame(game);
            grid.appendChild(card);
        });
    }

    function filterGames() {
        const query = document.getElementById('searchBar').value.toLowerCase();
        const filtered = gamesData.filter(g => g.name.toLowerCase().includes(query));
        renderGames(filtered);
    }

    function launchGame(game) {
        const folderName = game.name.toLowerCase().replace(/\s+/g, '-');
        const gameUrl = `files/${folderName}/index.html`;

        document.getElementById('iframeLoader').style.display = 'block';
        document.getElementById('currentGameTitle').innerText = game.name;
        document.getElementById('gameFrame').src = gameUrl;
        showPage('gameView');
    }

    function showPage(pageId) {
        document.getElementById('home').classList.add('hidden');
        document.getElementById('gameView').classList.add('hidden');
        document.getElementById(pageId).classList.remove('hidden');
        if(pageId === 'home') {
            document.getElementById('gameFrame').src = '';
            window.scrollTo(0,0);
        }
    }

    function toggleFullScreen() {
        const frame = document.getElementById('gameFrame');
        if (frame.requestFullscreen) frame.requestFullscreen();
        else if (frame.webkitRequestFullscreen) frame.webkitRequestFullscreen();
        else if (frame.msRequestFullscreen) frame.msRequestFullscreen();
    }

    loadGames();
</script>
</body>
</html>
